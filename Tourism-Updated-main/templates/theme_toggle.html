<!-- Theme Toggle Button & Script -->
<button class="theme-toggle-btn" id="themeToggleBtn" title="Toggle Dark Mode">
    <span id="themeIcon">🌙</span>
</button>

<script>
    (function () {
        const toggleBtn = document.getElementById('themeToggleBtn');
        const navToggleBtn = document.getElementById('navThemeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;
        
        // Initial load
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            body.classList.add('dark-mode');
            if(themeIcon) themeIcon.textContent = '☀️';
            if(navToggleBtn) navToggleBtn.textContent = '☀️';
        } else if (currentTheme === null && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            body.classList.add('dark-mode');
            if(themeIcon) themeIcon.textContent = '☀️';
            if(navToggleBtn) navToggleBtn.textContent = '☀️';
        }

        function toggleTheme() {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            const icon = isDark ? '☀️' : '🌙';
            if(themeIcon) themeIcon.textContent = icon;
            if(navToggleBtn) navToggleBtn.textContent = icon;
        }

        if(toggleBtn) toggleBtn.addEventListener('click', toggleTheme);
        if(navToggleBtn) navToggleBtn.addEventListener('click', toggleTheme);
    })();
</script>
